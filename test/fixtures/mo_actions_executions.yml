draft_import:
  action_key: import_users
  status: draft
  performer: admin (User)
  arguments:
    user_ids:
      - 1
      - 2
  preflight_results: {}
  progress: 0
  created_at: <%= 2.hours.ago %>
  updated_at: <%= 2.hours.ago %>

